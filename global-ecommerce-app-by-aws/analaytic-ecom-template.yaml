AWSTemplateFormatVersion: "2010-09-09"
Description: "E-commerce Analytics Infrastructure - S3, Kinesis, Glue, Athena"

Parameters:
  Environment:
    Type: String
    Default: "dev"
    AllowedValues: ["dev", "staging", "prod"]
    Description: Environment name

Resources:
  # S3 Data Lake Bucket
  DataLakeBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${Environment}-ecommerce-data-lake-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID:
                Fn::ImportValue: !Sub "${Environment}-KMSKey-ID"
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: AnalyticsDataLifecycle
            Status: Enabled
            Prefix: analytics/
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 90
                StorageClass: GLACIER
              - TransitionInDays: 365
                StorageClass: DEEP_ARCHIVE
            ExpirationInDays: 2555 # 7 years
          - Id: LogsLifecycle
            Status: Enabled
            Prefix: logs/
            Transitions:
              - TransitionInDays: 30
                StorageClass: STANDARD_IA
              - TransitionInDays: 60
                StorageClass: GLACIER
            ExpirationInDays: 365
          - Id: TempDataCleanup
            Status: Enabled
            Prefix: temp/
            ExpirationInDays: 7
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Kinesis Data Stream for Clickstream
  ClickstreamDataStream:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: !Sub "${Environment}-clickstream"
      ShardCount: 2
      StreamEncryption:
        EncryptionType: KMS
        KeyId:
          Fn::ImportValue: !Sub "${Environment}-KMSKey-ID"
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Kinesis Data Firehose (FIXED - Added SchemaConfiguration)
  ClickstreamFirehose:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub "${Environment}-clickstream-firehose"
      DeliveryStreamType: KinesisStreamAsSource
      KinesisStreamSourceConfiguration:
        KinesisStreamARN: !GetAtt ClickstreamDataStream.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt DataLakeBucket.Arn
        Prefix: "clickstream/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/hour=!{timestamp:HH}/"
        ErrorOutputPrefix: "errors/clickstream/"
        BufferingHints:
          SizeInMBs: 64 # Minimum required for data format conversion
          IntervalInSeconds: 300
        CompressionFormat: UNCOMPRESSED # Required when using data format conversion
        DataFormatConversionConfiguration:
          Enabled: true
          InputFormatConfiguration:
            Deserializer:
              OpenXJsonSerDe:
                ConvertDotsInJsonKeysToUnderscores: true
                CaseInsensitive: false
          OutputFormatConfiguration:
            Serializer:
              ParquetSerDe:
                Compression: SNAPPY
          SchemaConfiguration: # FIXED: Added missing SchemaConfiguration
            DatabaseName: !Ref GlueDatabase
            TableName: !Sub "${Environment}_clickstream_table"
            RoleARN: !GetAtt FirehoseDeliveryRole.Arn
        RoleARN: !GetAtt FirehoseDeliveryRole.Arn
        EncryptionConfiguration:
          KMSEncryptionConfig:
            AWSKMSKeyARN:
              Fn::ImportValue: !Sub "${Environment}-KMSKey-ARN"

  # Firehose Delivery Role (Enhanced with Glue permissions)
  FirehoseDeliveryRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-firehose-delivery-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseDeliveryPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub "${DataLakeBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - kinesis:DescribeStream
                  - kinesis:GetShardIterator
                  - kinesis:GetRecords
                  - kinesis:ListShards
                Resource: !GetAtt ClickstreamDataStream.Arn
              - Effect: Allow
                Action:
                  - kms:Encrypt
                  - kms:Decrypt
                  - kms:ReEncrypt*
                  - kms:GenerateDataKey*
                  - kms:DescribeKey
                Resource:
                  Fn::ImportValue: !Sub "${Environment}-KMSKey-ARN"
              - Effect: Allow # Added Glue permissions for schema configuration
                Action:
                  - glue:GetTable
                  - glue:GetTableVersion
                  - glue:GetTableVersions
                  - glue:GetDatabase
                  - glue:GetDatabases
                  - glue:CreateTable
                  - glue:UpdateTable
                  - glue:DeleteTable
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${GlueDatabase}"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${GlueDatabase}/*"

  # Glue Database
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${Environment}_ecommerce_analytics"
        Description: "Analytics database for e-commerce platform"

  # Glue Table for Clickstream (Required for SchemaConfiguration)
  ClickstreamTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: !Sub "${Environment}_clickstream_table"
        Description: "Clickstream data table for analytics"
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: "parquet"
          compressionType: "snappy"
        StorageDescriptor:
          Columns:
            - Name: user_id
              Type: string
            - Name: session_id
              Type: string
            - Name: event_type
              Type: string
            - Name: page_url
              Type: string
            - Name: timestamp
              Type: timestamp
            - Name: user_agent
              Type: string
            - Name: ip_address
              Type: string
            - Name: referrer
              Type: string
            - Name: product_id
              Type: string
            - Name: category
              Type: string
          Location: !Sub "s3://${DataLakeBucket}/clickstream/"
          InputFormat: "org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat"
          OutputFormat: "org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat"
          SerdeInfo:
            SerializationLibrary: "org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe"

  # Glue Crawler Role
  GlueCrawlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-glue-crawler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub "${DataLakeBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:DescribeKey
                  - kms:GenerateDataKey
                Resource:
                  Fn::ImportValue: !Sub "${Environment}-KMSKey-ARN"

  # Glue Crawler
  ClickstreamCrawler:
    Type: AWS::Glue::Crawler
    Properties:
      Name: !Sub "${Environment}-clickstream-crawler"
      Role: !GetAtt GlueCrawlerRole.Arn
      DatabaseName: !Ref GlueDatabase
      Targets:
        S3Targets:
          - Path: !Sub "s3://${DataLakeBucket}/clickstream/"
      Schedule:
        ScheduleExpression: "cron(0 2 * * ? *)" # Daily at 2 AM
      SchemaChangePolicy:
        UpdateBehavior: UPDATE_IN_DATABASE
        DeleteBehavior: LOG

Outputs:
  DataLakeBucketName:
    Description: Data Lake S3 Bucket Name
    Value: !Ref DataLakeBucket
    Export:
      Name: !Sub "${Environment}-DataLakeBucket-Name"

  DataLakeBucketArn:
    Description: Data Lake S3 Bucket ARN
    Value: !GetAtt DataLakeBucket.Arn
    Export:
      Name: !Sub "${Environment}-DataLakeBucket-ARN"

  ClickstreamDataStreamName:
    Description: Clickstream Kinesis Data Stream Name
    Value: !Ref ClickstreamDataStream
    Export:
      Name: !Sub "${Environment}-ClickstreamDataStream-Name"

  ClickstreamDataStreamArn:
    Description: Clickstream Kinesis Data Stream ARN
    Value: !GetAtt ClickstreamDataStream.Arn
    Export:
      Name: !Sub "${Environment}-ClickstreamDataStream-ARN"

  GlueDatabaseName:
    Description: Glue Database Name
    Value: !Ref GlueDatabase
    Export:
      Name: !Sub "${Environment}-GlueDatabase-Name"

  ClickstreamTableName:
    Description: Clickstream Glue Table Name
    Value: !Ref ClickstreamTable
    Export:
      Name: !Sub "${Environment}-ClickstreamTable-Name"

  ClickstreamFirehoseName:
    Description: Clickstream Firehose Delivery Stream Name
    Value: !Ref ClickstreamFirehose
    Export:
      Name: !Sub "${Environment}-ClickstreamFirehose-Name"

  ClickstreamFirehoseArn:
    Description: Clickstream Firehose Delivery Stream ARN
    Value: !GetAtt ClickstreamFirehose.Arn
    Export:
      Name: !Sub "${Environment}-ClickstreamFirehose-ARN"

  ClickstreamCrawlerName:
    Description: Clickstream Glue Crawler Name
    Value: !Ref ClickstreamCrawler
    Export:
      Name: !Sub "${Environment}-ClickstreamCrawler-Name"
