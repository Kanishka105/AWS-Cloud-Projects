AWSTemplateFormatVersion: "2010-09-09"
Description: "Complete API Gateway Configuration for E-commerce Microservices - No Logging"

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Environment name

  ApiGatewayId:
    Type: String
    Default: evq65i0jc1
    Description: Existing API Gateway REST API ID

  Region:
    Type: String
    Default: us-east-1
    Description: AWS Region

Resources:
  # ============================================================================
  # CUSTOM RESOURCE TO GET ROOT RESOURCE ID
  # ============================================================================

  GetRootResourceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Environment}-get-root-resource"
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt GetRootResourceRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          import json

          def handler(event, context):
              try:
                  if event['RequestType'] == 'Delete':
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
                      return
                  
                  client = boto3.client('apigateway')
                  rest_api_id = event['ResourceProperties']['RestApiId']
                  
                  response = client.get_resources(restApiId=rest_api_id)
                  
                  root_resource = None
                  for resource in response['items']:
                      if resource['path'] == '/':
                          root_resource = resource
                          break
                  
                  if root_resource:
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                          'RootResourceId': root_resource['id']
                      })
                  else:
                      cfnresponse.send(event, context, cfnresponse.FAILED, {})
              except Exception as e:
                  print(f"Error: {str(e)}")
                  cfnresponse.send(event, context, cfnresponse.FAILED, {})

  GetRootResourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiGatewayAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - apigateway:GET
                Resource: "*"

  ApiGatewayRootResource:
    Type: Custom::ApiGatewayRootResource
    Properties:
      ServiceToken: !GetAtt GetRootResourceFunction.Arn
      RestApiId: !Ref ApiGatewayId

  # ============================================================================
  # API GATEWAY RESOURCES (URL PATHS)
  # ============================================================================

  # /users resource
  UsersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayId
      ParentId: !GetAtt ApiGatewayRootResource.RootResourceId
      PathPart: users

  # /users/{userId} resource
  UserByIdResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGatewayId
      ParentId: !Ref UsersResource
      PathPart: "{userId}"

  # /products resource
  ProductsResource:
